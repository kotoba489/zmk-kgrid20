name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update
          # Zephyrの場所を絶対パスで環境変数に叩き込みます
          echo "ZEPHYR_BASE=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV

      - name: Build Firmware (FINAL)
        run: |
          # 前回特定した正しいパスを使用
          APP_PATH="$GITHUB_WORKSPACE/zmk/app"
          
          # Zephyr環境をエクスポート（今回はワークスペース内で実行）
          west zephyr-export
          
          # 左手ビルド
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          # 右手ビルド
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="$GITHUB_WORKSPACE/config"
          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
