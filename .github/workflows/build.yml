name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: West Init
        run: west init -l .
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export
      - name: Build Left
        run: |
          APP_DIR=$(find . -name "app" -type d -not -path "./config/*" | head -n 1)
          echo "Found app at: $APP_DIR"
          west build -s "$APP_DIR" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Build Right
        run: |
          APP_DIR=$(find . -name "app" -type d -not -path "./config/*" | head -n 1)
          west build -s "$APP_DIR" -b seeeduino_xiao_ble -d build/right -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Copy UF2
        run: |
          cp build/zephyr/zmk.uf2 totem_left.uf2
          cp build/right/zephyr/zmk.uf2 totem_right.uf2
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: "*.uf2"
