name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install West
        run: pip3 install west

      - name: Initialize Workspace
        run: |
          west init -l .
          west update

      - name: ZMK Build Action (Left)
        # ZMK公式のビルド用アクションを直接使います。これが最も確実です。
        uses: zmkfirmware/zmk-build-action@v2
        with:
          repository_path: zmk/app
          board: xiao_ble
          shield: totem_left
          config_path: config

      - name: ZMK Build Action (Right)
        uses: zmkfirmware/zmk-build-action@v2
        with:
          repository_path: zmk/app
          board: xiao_ble
          shield: totem_right
          config_path: config

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: |
            *.uf2
