name: Build kgrid All

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export

      # 1. kgrid40 (一体型)
      - name: Build kgrid40
        run: |
          west build -s zmk/app -b xiao_ble -- -DSHIELD=kgrid40 -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 kgrid40.uf2

      # 2. kgrid20 Left (分割型・親機)
      - name: Build kgrid20 Left
        run: |
          rm -rf build
          west build -s zmk/app -b xiao_ble -- -DSHIELD=kgrid20_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
