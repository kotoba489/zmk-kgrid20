name: Build
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: West Init
        run: west init -l .
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export
      - name: Build Left
        run: west build -s app -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Copy Left UF2
        run: cp build/zephyr/zmk.uf2 totem_left.uf2
      - name: Build Right
        run: |
          rm -rf build
          west build -s app -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Copy Right UF2
        run: cp build/zephyr/zmk.uf2 totem_right.uf2
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: "*.uf2"
