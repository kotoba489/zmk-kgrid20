name: Build ZMK Firmware
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Initialize workspace (west init)
        run: west init -l .

      - name: Update modules (west update)
        run: west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build Firmware (Auto-detect path)
        run: |
          # appディレクトリの場所を自動判別してビルド
          if [ -d "zmk/app" ]; then APP_PATH="zmk/app"; else APP_PATH="app"; fi
          
          echo "Using APP_PATH: $APP_PATH"
          
          # 左手版のビルド
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2
          
          # ビルドディレクトリをクリアして右手版
          rm -rf build
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
