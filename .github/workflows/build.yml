name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize workspace (west init)
        run: west init -l .

      - name: Update modules (west update)
        run: west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Debug - List all files (これでパスを特定します)
        # ファイル構造を最大2階層まで表示します
        run: find . -maxdepth 3 -not -path '*/.*'

      - name: Build Firmware
        run: |
          # フォルダを探して、appという名前が含まれる場所でビルドを実行
          APP_PATH=$(find . -type d -name "app" | head -n 1)
          echo "Found APP_PATH at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: app directory not found!"
            exit 1
          fi
          
          west build -s "$APP_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2
