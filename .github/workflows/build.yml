name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l .

      - name: West Update
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Totem Left
        run: west build -s config/zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Totem Right
        run: west build -s config/zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem-firmware
          path: build/zephyr/zmk.uf2
