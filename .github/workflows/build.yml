name: Build k_grid

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export

      # 1. Left側のビルド
      - name: West Build (Left)
        run: |
          rm -rf build
          west build -s zmk/app -b xiao_ble -- -DSHIELD=k_grid_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Left UF2
        run: cp build/zephyr/zmk.uf2 k_grid_left.uf2

      # 2. Right側のビルド
      - name: West Build (Right)
        run: |
          rm -rf build
          west build -s zmk/app -b xiao_ble -- -DSHIELD=k_grid_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Right UF2
        run: cp build/zephyr/zmk.uf2 k_grid_right.uf2

      # 3. Settings Resetのビルド
      - name: West Build (Settings Reset)
        run: |
          rm -rf build
          west build -s zmk/app -b xiao_ble -- -DSHIELD=settings_reset -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Rename Reset UF2
        run: cp build/zephyr/zmk.uf2 settings_reset.uf2

      # 成果物のアップロード
      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k_grid_firmware
          path: |
            k_grid_left.uf2
            k_grid_right.uf2
            settings_reset.uf2
