name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize and Update
        run: |
          west init -l .
          west update
          echo "ZEPHYR_BASE=$GITHUB_WORKSPACE/zephyr" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          west zephyr-export
          APP_PATH="/__w/zmk-config-kotoba489/zmk/app"
          
          # ボード名を 'xiao_ble' に修正しました
          west build -s "$APP_PATH" -b xiao_ble -- \
            -DSHIELD=totem_left \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config"

          cp build/zephyr/zmk.uf2 ./totem_left.uf2
          
          rm -rf build
          west build -s "$APP_PATH" -b xiao_ble -- \
            -DSHIELD=totem_right \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/config"

          cp build/zephyr/zmk.uf2 ./totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
