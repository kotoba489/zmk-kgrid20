name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v3からv4へ更新

      - name: Cache west modules
        uses: actions/cache@v4 # v3からv4へ更新
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk
          key: ${{ runner.os }}-build-${{ hashFiles('**/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Initialize workspace (west init)
        run: west init -l config

      - name: Update modules (west update)
        run: west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build Left Side
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right Side
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4 # ここがエラーの原因。v3からv4へ更新
        with:
          name: totem_firmware
          path: |
            build/zephyr/zmk.uf2
            # 左右別々に保存したい場合は以下のように指定
            # build/zephyr/left_zmk.uf2
            # build/zephyr/right_zmk.uf2
