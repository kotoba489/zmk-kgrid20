/name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: West Init
        run: west init -l .

      - name: West Update
        # フォルダ構成が変わったため、一度確実に中身を同期させます
        run: west update

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build Left
        # フォルダが見つからないエラーを防ぐため、パスの指定を確実にします
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=k_grid_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Build Right
        run: west build -s zmk/app -b seeeduino_xiao_ble -- -DSHIELD=k_grid_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: k_grid_firmware
          path: build/zephyr/zmk.uf2
