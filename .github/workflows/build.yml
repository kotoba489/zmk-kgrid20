name: Build ZMK Firmware
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize workspace (west init)
        # 確実にカレントディレクトリをワークスペースにします
        run: west init -l .

      - name: Update modules (west update)
        # ここでZMK本体が 'zmk' フォルダにダウンロードされます
        run: west update

      - name: Export Zephyr env
        run: west zephyr-export

      - name: Build Firmware
        run: |
          # ZMKの構造上、本体は通常 'zmk/app' に展開されます。
          # もしそこになければ、直接 'app' を探します。
          if [ -d "zmk/app" ]; then
            TARGET_PATH="zmk/app"
          elif [ -d "app" ]; then
            TARGET_PATH="app"
          else
            # 最終手段：システム全体からappフォルダを探し出す
            TARGET_PATH=$(find . -name "app" -type d -print -quit)
          fi
          
          echo "Determined TARGET_PATH: $TARGET_PATH"
          
          # 左手のビルド
          west build -s "$TARGET_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_left -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_left.uf2
          
          # 右手のビルド（buildフォルダを一旦消す）
          rm -rf build
          west build -s "$TARGET_PATH" -b seeeduino_xiao_ble -- -DSHIELD=totem_right -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
          cp build/zephyr/zmk.uf2 totem_right.uf2

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: totem_firmware
          path: ./*.uf2
